- defaults:
    link:
      create: true
      relink: true
      force: true

- clean:
    - "~"

- create:
    - ~/.config
    - ~/.config/direnv
    - ~/.config/ssh
    - ~/Library/Preferences/pypoetry

- link:
    # editorconfig
    ~/.editorconfig: ~/.dotfiles/etc/.editorconfig

    # git
    ~/.gitconfig: ~/.dotfiles/etc/git/.gitconfig
    ~/.gitignore_global: ~/.dotfiles/etc/git/.gitignore_global
    ~/.gitattributes: ~/.dotfiles/etc/git/.gitattributes

    # poetry
    ~/Library/Preferences/pypoetry/config.toml:
      path: ~/.dotfiles/etc/poetry/config.toml

    # zsh
    ~/.zshrc: ~/.dotfiles/etc/zsh/.zshrc
    ~/.zsh_plugins.txt: ~/.dotfiles/etc/zsh/.zsh_plugins.txt
    ~/.p10k.zsh: ~/.dotfiles/etc/zsh/.p10k.zsh
    ~/.hushlogin: ~/.dotfiles/etc/zsh/.hushlogin

    # ssh
    ~/.ssh/config: ~/.dotfiles/etc/ssh/config

    # direnv
    ~/.config/direnv/direnv.toml: ~/.dotfiles/etc/direnv/direnv.toml

