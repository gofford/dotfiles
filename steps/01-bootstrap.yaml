- defaults:
    link:
      relink: true
      force: true

# Install Homebrew if not present (must run before anything else)
- shell:
    - description: Install Homebrew
      command: scripts/bootstrap-homebrew.sh

# Bootstrap shell - install essential brew packages
- shell:
    - description: Install essential packages for bootstrap
      command: |
        shell_path="$(brew --prefix)/bin/zsh"
        if [ ! -x "${shell_path}" ]; then
          brew install zsh
        fi

- shell:
    - description: Change default shell to Homebrew Zsh
      quiet: false
      command: scripts/bootstrap-shell.sh

# Clean and create directories
- clean:
    ~/.config/zsh:
      recursive: true
    ~/.config/sheldon:
      recursive: true
    ~/.config/atuin:
      recursive: true
    ~/.config/ghostty:
      recursive: true
    ~/.config/direnv:
      recursive: true
    ~/.config/k9s:
      recursive: true

- create:
    - ~/.config
    - ~/.config/direnv
    - ~/.config/sheldon
    - ~/.config/atuin
    - ~/.config/ghostty
    - ~/.ssh
    - ~/.config/zsh
    - ~/.config/zsh/completions
    - ~/.codex
    - ~/.codex/agents
    - ~/.codex/rules
    - ~/.codex/scripts
    - ~/.codex/skills
    - ~/.claude
    - ~/.config/k9s
    - "~/Library/Application Support/Cursor"
    - "~/Library/Application Support/Cursor/User"

# Final setup
- shell:
    - command: touch ~/.hushlogin
      description: Disable login message
    - command: brew install rcmdnk/file/brew-file
      description: Install homebrew-file plugin for package management
