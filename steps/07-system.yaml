- defaults:
    link:
      relink: true
      force: true

# Ensure config directories exist
- create:
    - ~/.config/opencode
    - ~/.claude
    - ~/.claude/hooks

# Link system configuration files
- link:
    # ssh configuration
    ~/.ssh/config: ~/.dotfiles/ssh/config

    # direnv configuration
    ~/.config/direnv/direnv.toml: ~/.dotfiles/direnv/direnv.toml

    # opencode configuration
    ~/.config/opencode/opencode.json: ~/.dotfiles/opencode/opencode.json
    ~/.config/opencode/dcp.jsonc: ~/.dotfiles/opencode/dcp.jsonc
    ~/.config/opencode/agents: ~/.dotfiles/opencode/agents
    ~/.config/opencode/skills: ~/.dotfiles/opencode/skills
    ~/.config/opencode/commands: ~/.dotfiles/opencode/commands
    ~/.config/opencode/plugin: ~/.dotfiles/opencode/plugin

    # claude code configuration
    ~/.claude/settings.json: ~/.dotfiles/claude/settings.json
    ~/.claude/CLAUDE.md: ~/.dotfiles/claude/CLAUDE.md
    ~/.claude/agents: ~/.dotfiles/claude/agents
    ~/.claude/commands: ~/.dotfiles/claude/commands
    ~/.claude/skills: ~/.dotfiles/claude/skills
    ~/.claude/rules: ~/.dotfiles/claude/rules
    ~/.claude/scripts: ~/.dotfiles/claude/scripts

    # k9s configuration
    ~/.config/k9s:
      glob: true
      path: ~/.dotfiles/k9s/*
      relink: true

    # ghostty configuration
    ~/.config/ghostty/config: ~/.dotfiles/ghostty/config

    # editor configuration
    ~/.editorconfig: ~/.dotfiles/.editorconfig

# Install operator tooling and register RTK-managed hook.
- shell:
    - command: uv tool install --force claude-code-tools
      description: Install claude-code-tools CLI
      stdout: true
      stderr: true
    - command: rtk init -g --hook-only
      description: Register RTK Claude Code PreToolUse hook
      stdout: true
      stderr: true

