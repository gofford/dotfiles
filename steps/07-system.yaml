- defaults:
    link:
      relink: true
      force: true

# Ensure config directories exist
- create:
    - ~/.codex
    - ~/.codex/agents
    - ~/.codex/rules
    - ~/.codex/scripts
    - ~/.codex/skills
    - ~/.claude
    - ~/.claude/hooks

# Link system configuration files
- link:
    # ssh configuration
    ~/.ssh/config: ~/.dotfiles/ssh/config

    # direnv configuration
    ~/.config/direnv/direnv.toml: ~/.dotfiles/direnv/direnv.toml

    # codex configuration
    ~/.codex/config.toml: codex/config.toml
    ~/.codex/AGENTS.md: codex/AGENTS.md
    ~/.codex/agents: codex/agents
    ~/.codex/rules: codex/rules
    ~/.codex/scripts: codex/scripts

    # claude code configuration
    ~/.claude/settings.json: claude/settings.json
    ~/.claude/CLAUDE.md: claude/CLAUDE.md
    ~/.claude/agents: claude/agents
    ~/.claude/commands: claude/commands
    ~/.claude/skills: claude/skills
    ~/.claude/scripts: claude/scripts

    # k9s configuration
    ~/.config/k9s:
      glob: true
      path: k9s/*
      relink: true

    # ghostty configuration
    ~/.config/ghostty/config: ghostty/config

    # editor configuration
    ~/.editorconfig: .editorconfig

# Install operator tooling.
- shell:
    - command: codex/scripts/install-skills.sh
      description: Sync managed Codex skills via npx skills
      stdout: true
      stderr: true
