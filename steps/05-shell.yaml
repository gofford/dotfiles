- defaults:
    link:
      relink: true
      force: true

# Link shell configuration files
- link:
    # zsh configuration
    ~/.zshenv: shell/zsh/.zshenv
    ~/.config/zsh/.zshrc: shell/zsh/.zshrc
    ~/.config/zsh/.aliases: shell/zsh/.aliases
    ~/.config/zsh/.zprofile: shell/zsh/.zprofile
    ~/.config/zsh/.fzf.zsh: shell/zsh/.fzf.zsh
    ~/.config/zsh/.atuin-fzf.zsh: shell/zsh/.atuin-fzf.zsh

    # zsh completions
    ~/.config/zsh/completions:
      glob: true
      path: shell/zsh/completions/*
      relink: true

    # oh-my-posh prompt
    ~/.prompt.omp.json: shell/omp/.prompt.omp.json

    # sheldon plugin manager
    ~/.config/sheldon/plugins.toml: shell/sheldon/plugins.toml

    # atuin configuration
    ~/.config/atuin/config.toml: atuin/config.toml

# Install Sheldon plugins
- shell:
    - description: Refresh Sheldon lock when plugin config changes
      command: scripts/update-sheldon-lock.sh
